services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/twse_heat.db
      - TOP100_CACHE_TTL_SECONDS=3
      - ETF_CACHE_TTL_SECONDS=3
      - SQLITE_BUSY_TIMEOUT_MS=5000
      - SQLITE_CACHE_SIZE_KIB=8192
      - UVICORN_WORKERS=1
      - UVICORN_KEEPALIVE_SECONDS=5
      - UVICORN_LOG_LEVEL=warning
      - SCORES_DIR=/app/data/buy_scores
      - SCORING_FLAG_STALE_S=${SCORING_FLAG_STALE_S:-10800}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  crawler:
    build: ./crawler
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/twse_heat.db
      - FINMIND_TOKEN=${FINMIND_TOKEN:-}
      - SCORES_DIR=/app/data/buy_scores
      - SCORE_CANDIDATE_LIMIT=${SCORE_CANDIDATE_LIMIT:-600}
      - BUY_SCORE_QUOTA_WAIT_S=${BUY_SCORE_QUOTA_WAIT_S:-3600}
      - SCORING_FLAG_STALE_S=${SCORING_FLAG_STALE_S:-10800}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  etf-crawler:
    build: ./crawler
    restart: unless-stopped
    command: python etf_main.py
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/twse_heat.db
      - ETF_KEEP_DAYS=${ETF_KEEP_DAYS:-90}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "8504:80"
    environment:
      - NGINX_PORT=80
      - BACKEND_HOST=backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
