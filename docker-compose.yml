services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/twse_heat.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-net

  crawler:
    build: ./crawler
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/twse_heat.db
      - FINMIND_TOKEN=${FINMIND_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
